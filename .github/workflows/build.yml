name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Testy (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install pytest pillow numpy requests soundfile imageio-ffmpeg
      - name: pytest
        run: PYTHONPATH=src pytest -q

  build-windows:
    name: Build .exe (Windows)
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      - name: Build
        run: pyinstaller build_exe.spec --noconfirm
      - name: Upload artefaktu
        uses: actions/upload-artifact@v4
        with:
          name: PiroOverlay-windows
          path: dist/PiroOverlay.exe
          if-no-files-found: error

  release-latest:
    name: Rolling release (latest)
    needs: build-windows
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pobierz artefakt
        uses: actions/download-artifact@v4
        with:
          name: PiroOverlay-windows
      - name: Aktualizuj rolling release
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest (main)"
          body: |
            Automatyczny build z brancha `main`.
            Commit: ${{ github.sha }}
            Data: ${{ github.event.head_commit.timestamp }}
          prerelease: true
          makeLatest: false
          allowUpdates: true
          removeArtifacts: true
          artifacts: PiroOverlay.exe

  release-versioned:
    name: Dołącz .exe do release (tag)
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pobierz artefakt
        uses: actions/download-artifact@v4
        with:
          name: PiroOverlay-windows
      - name: Utwórz release wersjonowany
        uses: softprops/action-gh-release@v2
        with:
          files: PiroOverlay.exe
