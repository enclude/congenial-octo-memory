name: Build

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    name: Testy (Linux)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install pytest pillow numpy requests soundfile imageio-ffmpeg
      - name: Regeneracja snapshotów (wersja Pillow CI może różnić się od lokalnej)
        run: PIRO_UPDATE_SNAPSHOTS=1 PYTHONPATH=src pytest tests/test_overlay.py -q
      - name: pytest
        run: PYTHONPATH=src pytest -q

  build-windows:
    name: Build .exe (Windows)
    needs: test
    if: github.event_name != 'pull_request'
    runs-on: windows-latest
    outputs:
      version: ${{ steps.ver.outputs.version }}
      exe_name: ${{ steps.ver.outputs.exe_name }}
    steps:
      - uses: actions/checkout@v5
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
      - name: Instalacja zależności
        run: |
          python -m pip install --upgrade pip
          pip install -e .
          pip install pyinstaller
      - name: Odczytaj wersję
        id: ver
        shell: python
        run: |
          import re, os
          m = re.search(r'__version__\s*=\s*["\'](.+?)["\']',
                        open('src/piro_overlay/__init__.py').read())
          v = m.group(1)
          exe = f'PiroOverlay-v{v}.exe'
          with open(os.environ['GITHUB_OUTPUT'], 'a') as f:
              f.write(f'version={v}\n')
              f.write(f'exe_name={exe}\n')
      - name: Build
        run: pyinstaller build_exe.spec --noconfirm
      - name: Zmień nazwę .exe
        shell: bash
        run: mv dist/PiroOverlay.exe "dist/${{ steps.ver.outputs.exe_name }}"
      - name: Upload artefaktu
        uses: actions/upload-artifact@v5
        with:
          name: PiroOverlay-windows
          path: dist/PiroOverlay-v*.exe
          if-no-files-found: error

  release-or-tag:
    name: Release (wersjonowany + rolling latest)
    needs: build-windows
    if: github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - name: Pobierz artefakt
        uses: actions/download-artifact@v5
        with:
          name: PiroOverlay-windows
      - name: Odczytaj wersję i utwórz tag jeśli nowy
        id: ver
        run: |
          VERSION=$(python -c "import re; m=re.search(r'__version__\s*=\s*[\"\'](.*?)[\"\']', open('src/piro_overlay/__init__.py').read()); print(m.group(1))")
          TAG="v$VERSION"
          echo "tag=$TAG" >> $GITHUB_OUTPUT
          if git rev-parse "$TAG" >/dev/null 2>&1; then
            echo "new_tag=false" >> $GITHUB_OUTPUT
          else
            git config user.name "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$TAG"
            git push origin "$TAG"
            echo "new_tag=true" >> $GITHUB_OUTPUT
          fi
      - name: Trwały release dla nowego tagu
        if: steps.ver.outputs.new_tag == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.ver.outputs.tag }}
          files: ${{ needs.build-windows.outputs.exe_name }}
      - name: Rolling release (latest) — zawsze
        uses: ncipollo/release-action@v1
        with:
          tag: latest
          name: "Latest (main)"
          body: |
            Automatyczny build z brancha `main`.
            Commit: ${{ github.sha }}
            Data: ${{ github.event.head_commit.timestamp }}
          prerelease: true
          makeLatest: false
          allowUpdates: true
          removeArtifacts: true
          artifacts: ${{ needs.build-windows.outputs.exe_name }}

  release-versioned:
    name: Dołącz .exe do release (tag ręczny)
    needs: build-windows
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Pobierz artefakt
        uses: actions/download-artifact@v5
        with:
          name: PiroOverlay-windows
      - name: Utwórz release wersjonowany
        uses: softprops/action-gh-release@v2
        with:
          files: ${{ needs.build-windows.outputs.exe_name }}
